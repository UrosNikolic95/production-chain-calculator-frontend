server {
    listen 80;
    server_name www.production-chain-calculator.urosnikolic95.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name www.production-chain-calculator.urosnikolic95.com;

    root /home/project/production-chain-calculator/production-chain-calculator-frontend/dist/production-chain-calculator-frontend/browser;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
