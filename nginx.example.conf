# Example nginx config: serves the built Angular app as static files.
#
# This is the HTTP-only starting point. Deploy THIS first (the TLS files don't
# exist yet, so a 443 block would fail `nginx -t`). Then run certbot, which
# obtains the cert and rewrites this file with the 443 block + HTTP->HTTPS
# redirect + ssl_* lines automatically:
#
#   sudo certbot --nginx \
#     -d production-chain-calculator.urosnikolic95.com \
#     -d www.production-chain-calculator.urosnikolic95.com
#
# Prerequisites for certbot: DNS A records for both names point here, port 80 open.

server {
    listen 80;
    server_name production-chain-calculator.urosnikolic95.com www.production-chain-calculator.urosnikolic95.com;

    # Build output of `npm run build`
    root /home/projects/production-chain-calculator/production-chain-calculator-frontend/dist/production-chain-calculator-frontend/browser;
    index index.html;

    # Serve static files, fall back to index.html for client-side routing
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache hashed static assets aggressively
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }
}
